name: Build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  CONFIGURATION: Release
  PACKAGE_PROJECT: src/ExplicitMidpointRoundingAnalyzer/ExplicitMidpointRoundingAnalyzer.csproj

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ExplicitMidpointRoundingAnalyzer.slnx

      - name: Build
        run: dotnet build ExplicitMidpointRoundingAnalyzer.slnx --configuration $CONFIGURATION --no-restore

      - name: Test
        run: dotnet test ExplicitMidpointRoundingAnalyzer.slnx --configuration $CONFIGURATION --no-build

      - name: Pack
        run: dotnet pack $PACKAGE_PROJECT --configuration $CONFIGURATION --no-build --output artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*.nupkg
          if-no-files-found: error
